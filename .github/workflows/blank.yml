name: Hello World Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Say Hello
        run: echo "Hello, World!"

  second-job:
    runs-on: ubuntu-latest
    needs: hello
    steps:
      - name: Run after hello job
        run: echo "This runs after the first job finishes successfully!"
        
